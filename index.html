<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Abrilucha ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #1a0a2e; }

    .ts-wrap {
      min-height: 100vh; width: 100%; position: relative;
      background: linear-gradient(160deg, #1a0a2e 0%, #2d1052 40%, #1a0a2e 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    canvas.stars-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

    /* COVER */
    .cover-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; position: relative; z-index: 2; width: 100%; min-height: 100vh;
    }
    .era-badge { font-family: 'Caveat', cursive; font-size: 0.9rem; letter-spacing: 3px; color: #c9a96e; text-transform: uppercase; margin-bottom: 1rem; }
    .cover-title { font-family: 'Caveat', cursive; font-size: clamp(2.4rem, 8vw, 3.4rem); font-weight: 700; color: #f0e6ff; line-height: 1.15; text-shadow: 0 0 40px rgba(180,130,255,0.5); }
    .cover-sub { font-family: 'Kalam', cursive; font-size: 1.1rem; color: #c9a0ff; margin: 0.9rem 0 2.5rem; font-style: italic; line-height: 1.6; }
    .guitar-line { font-size: 1.4rem; letter-spacing: 10px; margin-bottom: 2rem; color: #c9a96e; }
    .btn-start {
      font-family: 'Caveat', cursive; font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, #7b2ff7, #c850c0); border: none;
      border-radius: 999px; padding: 0.75rem 2.5rem; cursor: pointer; color: #fff;
      box-shadow: 0 0 24px rgba(180,80,255,0.45); transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(180,80,255,0.65); }
    .cover-quote { font-family: 'Kalam', cursive; font-size: 0.85rem; color: rgba(200,160,255,0.45); margin-top: 2.5rem; font-style: italic; max-width: 360px; }

    /* PAGE VIEW */
    .page-view {
      display: none; flex-direction: column; align-items: center;
      width: 100%; padding: 1.2rem 1rem 1.5rem;
      position: relative; z-index: 2;
    }
    .page-view.active { display: flex; }

    /* PROGRESS */
    .progress-area { width: 100%; max-width: 640px; margin-bottom: 0.8rem; }
    .prog-label { font-family: 'Caveat', cursive; font-size: 0.8rem; color: rgba(200,160,255,0.55); text-align: right; margin-bottom: 4px; }
    .prog-track { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, #7b2ff7, #f472b6); border-radius: 999px; transition: width 0.5s ease; width: 0%; }

    /* CARD */
    .page-card {
      width: 100%; max-width: 640px; border-radius: 6px;
      padding: 1.6rem 1.8rem 1.6rem; position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .page-card.era-midnights { background: linear-gradient(145deg, #0d0d2b, #1a1a4e); }
    .page-card.era-lover     { background: linear-gradient(145deg, #2d0a3a, #3d1060); }
    .page-card.era-ttpd      { background: linear-gradient(145deg, #1a0a2e, #2d1052); }
    .page-card.era-fearless  { background: linear-gradient(145deg, #1c1200, #2d1e00); }
    .page-card.era-evermore  { background: linear-gradient(145deg, #0a1a0a, #0f2710); }

    .page-card.slide-in-right { animation: slideInRight 0.4s ease forwards; }
    .page-card.slide-in-left  { animation: slideInLeft 0.4s ease forwards; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInLeft  { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }

    .tape { position: absolute; width: 58px; height: 18px; border-radius: 2px; background: rgba(255,220,100,0.22); border: 0.5px solid rgba(255,200,50,0.22); }
    .tape.top-c { top: -9px; left: 50%; transform: translateX(-50%); }
    .tape.top-l { top: -9px; left: 28px; rotate: -4deg; }
    .tape.top-r { top: -9px; right: 28px; rotate: 4deg; }

    .era-tag { display: inline-block; font-family: 'Caveat', cursive; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; padding: 2px 9px; border-radius: 999px; margin-bottom: 0.5rem; border: 0.5px solid rgba(255,255,255,0.12); }
    .era-tag.m { background: rgba(100,80,200,0.3);  color: #b8a0ff; }
    .era-tag.l { background: rgba(220,100,200,0.2); color: #f0a0e0; }
    .era-tag.t { background: rgba(200,200,200,0.1); color: #d0d0d0; }
    .era-tag.f { background: rgba(200,150,30,0.2);  color: #d4a830; }
    .era-tag.e { background: rgba(60,120,60,0.25);  color: #80c880; }

    .ruled { position: absolute; inset: 0; border-radius: inherit; pointer-events: none; overflow: hidden; opacity: 0.04; }
    .ruled::before { content: ''; position: absolute; top: 70px; left: 0; right: 0; bottom: 0; background-image: repeating-linear-gradient(transparent, transparent 28px, #fff 28px, #fff 29px); }

    .sticker { position: absolute; top: 12px; right: 16px; font-family: 'Caveat', cursive; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    .sticker.gold { background: rgba(212,175,55,0.25); color: #c9a96e; border: 0.5px solid rgba(212,175,55,0.3); rotate: 6deg; }
    .sticker.pink { background: rgba(244,114,182,0.2); color: #f0a0d8; border: 0.5px solid rgba(244,114,182,0.25); rotate: -4deg; }

    .lyric-pull { margin: 0 0 0.7rem; padding: 0.5rem 0.9rem; border-left: 2px solid rgba(200,160,255,0.3); font-family: 'Caveat', cursive; font-size: 0.98rem; color: #c9a0ff; font-style: italic; line-height: 1.45; }

    .page-text { font-family: 'Kalam', cursive; font-size: 0.98rem; line-height: 1.78; color: #e8d8ff; white-space: pre-wrap; }
    .page-text strong { font-weight: 700; color: #f0e6ff; }
    .page-text em { font-style: italic; color: #c9a0ff; }

    .divider { font-family: 'Caveat', cursive; font-size: 0.95rem; color: rgba(200,160,255,0.35); text-align: center; margin: 0.5rem 0; letter-spacing: 8px; }
    .corner-note { position: absolute; bottom: 10px; right: 14px; font-family: 'Caveat', cursive; font-size: 0.72rem; color: rgba(200,160,255,0.38); font-style: italic; }

    /* PHOTOS */
    .photos-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 1rem 0 0.5rem; }

    .polaroid {
      background: #fff;
      padding: 7px 7px 28px 7px;
      box-shadow: 2px 3px 12px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .polaroid img { display: block; width: 160px; height: 140px; object-fit: cover; }
    .polaroid .caption {
      font-family: 'Caveat', cursive; font-size: 0.82rem; color: #444;
      text-align: center; margin-top: 4px; line-height: 1.2;
    }
    .polaroid.tilt-l { rotate: -4deg; }
    .polaroid.tilt-r { rotate: 3deg; }
    .polaroid.tilt-ll { rotate: -7deg; }
    .polaroid.tilt-rr { rotate: 6deg; }

    .postal {
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 2px 3px 12px rgba(0,0,0,0.4);
      flex-shrink: 0;
      position: relative;
    }
    .postal img { display: block; width: 160px; height: 150px; object-fit: cover; }
    .postal.tilt-l { rotate: -5deg; }
    .postal.tilt-r { rotate: 4deg; }
    .postal.tilt-ll { rotate: -8deg; }

    .polaroid-tape {
      position: absolute;
      width: 42px; height: 14px;
      background: rgba(255,220,100,0.55);
      border-radius: 1px;
      top: -7px; left: 50%; transform: translateX(-50%);
    }

    .photos-center { display: flex; justify-content: center; margin: 1rem 0 0.3rem; }
    .polaroid-lg img { width: 200px; height: 180px; }

    /* FINAL */
    .final-sign { font-family: 'Caveat', cursive; font-size: 1.8rem; font-weight: 700; color: #f0e6ff; display: block; margin-top: 1rem; line-height: 1.4; text-shadow: 0 0 30px rgba(200,150,255,0.4); text-align: center; }
    .final-hearts { display: block; font-size: 1.3rem; margin-top: 0.4rem; letter-spacing: 8px; color: #f472b6; text-align: center; }

    /* NAV */
    .nav-area { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-top: 1rem; width: 100%; max-width: 640px; }
    .btn-nav { font-family: 'Caveat', cursive; font-size: 1.1rem; font-weight: 700; background: none; border: 1.5px solid rgba(180,100,255,0.45); border-radius: 999px; padding: 0.5rem 1.6rem; cursor: pointer; color: #c9a0ff; transition: background 0.2s; }
    .btn-nav:hover { background: rgba(180,100,255,0.1); }
    .btn-nav:disabled { opacity: 0.2; cursor: default; }
    .btn-nav.btn-next { background: linear-gradient(135deg, rgba(123,47,247,0.3), rgba(200,80,192,0.3)); border-color: rgba(200,80,192,0.5); }

    @media (max-width: 480px) {
      .page-card { padding: 1.4rem 1.2rem; }
      .page-text { font-size: 0.93rem; }
      .polaroid img, .postal img { width: 130px; height: 115px; }
      .polaroid { padding: 5px 5px 22px 5px; }
      .polaroid-lg img { width: 160px; height: 145px; }
    }
  </style>
</head>
<body>
<div class="ts-wrap">
  <canvas class="stars-bg" id="stars"></canvas>

  <div class="cover-screen" id="cover">
    <p class="era-badge">✦ una carta especial ✦</p>
    <p class="cover-title">Para vos,<br>Abrilucha.</p>
    <p class="cover-sub">"Long story short, I survived."<br><span style="font-size:0.82rem;opacity:0.6">— Taylor Swift</span></p>
    <div class="guitar-line">♪ ♫ ♪</div>
    <button class="btn-start" onclick="startCarta()">Abrir carta ↓</button>
    <p class="cover-quote">"She lost him but she found herself and somehow that was everything."</p>
  </div>

  <div class="page-view" id="page-view">
    <div class="progress-area">
      <p class="prog-label" id="prog-label">página 1 de 7</p>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
    <div class="page-card era-midnights" id="page-card"></div>
    <div class="nav-area">
      <button class="btn-nav" id="btn-prev" onclick="goPage(-1)" disabled>← atrás</button>
      <button class="btn-nav btn-next" id="btn-next" onclick="goPage(1)">seguir leyendo →</button>
    </div>
  </div>
</div>

      sticker: '',
      lyric: '"I had the best day with you today."',

      lyric: '"Long story short, I survived."',
      content: 'Muchas veces, cuando intentamos hablar, siento que entramos en una discusión donde cada una está más preocupada por responder que por entender.\n\nCon los años aprendí algo que me hubiera gustado saber antes:\n<div class="divider">— — —</div><strong>Escuchar vale mucho más que hablar.</strong>\n\nCuando escuchás de verdad, aprendés. Pensás. Reflexionás. Entendés cosas que quizás no habías visto.\n\nEn cambio, cuando uno responde automáticamente, busca justificarse o quiere tener la última palabra, deja de escuchar lo importante.\n\n<em>No hace falta levantar la voz para ser escuchado.</em>',

  var TOTAL = pages.length;
  var current = 0;

  function drawStars() {
    var c = document.getElementById('stars');
    if (!c) return;
    var ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < 180; i++) {
      var x = Math.random() * c.width, y = Math.random() * c.height;
      var r = Math.random() * 1.3 + 0.2, a = Math.random() * 0.65 + 0.1;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + a + ')'; ctx.fill();
    }
  }
  drawStars();
  window.addEventListener('resize', drawStars);

  function startCarta() {
    document.getElementById('cover').style.display = 'none';
    document.getElementById('page-view').classList.add('active');
    renderPage(0, 1);
  }

  function renderPage(idx, dir) {
    var p = pages[idx];
    var card = document.getElementById('page-card');
    card.className = 'page-card ' + p.era;
    var html = '<div class="ruled"></div>' + p.tape;
    if (p.sticker) html += p.sticker;
    html += p.tag;
    html += '<div class="lyric-pull">' + p.lyric + '</div>';
    if (p.photos) html += p.photos;
    html += '<p class="page-text">' + p.content + '</p>';
    if (p.corner) html += '<span class="corner-note">' + p.corner + '</span>';
    card.innerHTML = html;
    card.classList.remove('slide-in-right', 'slide-in-left');
    void card.offsetWidth;
    card.classList.add(dir >= 0 ? 'slide-in-right' : 'slide-in-left');
    window.scrollTo(0, 0);
    updateProgress(idx);
    updateButtons(idx);
  }

  function goPage(dir) {
    var next = current + dir;
    if (next < 0 || next >= TOTAL) return;
    current = next; renderPage(current, dir);
  }

  function updateProgress(idx) {
    var pct = Math.round(((idx + 1) / TOTAL) * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').textContent = 'página ' + (idx + 1) + ' de ' + TOTAL;
  }

  function updateButtons(idx) {
    document.getElementById('btn-prev').disabled = idx === 0;
    var btnNext = document.getElementById('btn-next');
    if (idx === TOTAL - 1) { btnNext.textContent = '♡ fin'; btnNext.disabled = true; }
    else { btnNext.textContent = 'seguir leyendo →'; btnNext.disabled = false; }
  }
